name = "temporal-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Custom domains. The zone is in this Cloudflare account (registered
# via Cloudflare Registrar) so the DNS record is provisioned by wrangler.
[[routes]]
pattern = "temporal-mcp.dev"
custom_domain = true

[[routes]]
pattern = "www.temporal-mcp.dev"
custom_domain = true

# Observability — free tier on the Workers Logs UI.
[observability]
enabled = true

# Per-user request rate limit: 60 requests / 60 seconds, keyed by the
# SHA256 of the bearer token (so anonymous abuse from one IP can't take
# down the endpoint and one tenant can't starve another).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Per-user temporal state. Two columns key the only row that matters:
# (token_hash, thread_key).
[[d1_databases]]
binding = "DB"
database_name = "temporal_mcp"
database_id = "8c53a898-4788-401d-9345-ce28d414f647"
migrations_dir = "migrations"

# Default timezone for headers when the request doesn't pin one. UTC is
# safe; users can override per-call.
[vars]
DEFAULT_TZ = "UTC"
# Production: require Authorization: Bearer <token>. Without auth all
# anonymous callers would share one state bucket and pollute each
# other's delta_sec. Local dev overrides this to "false" via .dev.vars
# so wrangler dev works without ceremony.
REQUIRE_AUTH = "true"
